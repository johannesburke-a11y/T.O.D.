<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Maturity Index — IONOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b2a63;
    --navy-deep: #071b42;
    --navy-mid: #1a3f7a;
    --navy-light: #2a5298;
    --ice: #d2f6fc;
    --ice-deep: #a8eef8;
    --sky: #dbedf8;
    --sky-deep: #b8d8f0;
    --white: #ffffff;
    --off-white: #f4f8fd;
    --text-primary: #0b2a63;
    --text-secondary: #3a5480;
    --text-muted: #7a94bc;
    --border: rgba(11,42,99,0.12);
    --border-strong: rgba(11,42,99,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Figtree', sans-serif;
    background: var(--off-white);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 0;
    position: relative;
    overflow: visible;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(210,246,252,0.07);
    pointer-events: none;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 30%;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(219,237,248,0.05);
    pointer-events: none;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 2rem 0;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .brand-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ice);
  }
  .brand-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(210,246,252,0.6);
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(26px, 4vw, 36px);
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .header h1 span { color: var(--ice); }

  .score-summary {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .score-big {
    font-size: 48px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .score-big span { font-size: 22px; color: rgba(255,255,255,0.4); font-weight: 400; }
  .tier-pill {
    padding: 6px 16px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Progress bar ── */
  .progress-section {
    padding: 0 2rem 2rem;
    max-width: 860px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    overflow: visible;
  }
  .tier-track {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 3px;
    margin-bottom: 6px;
  }
  .tier-seg {
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    transition: background 0.4s;
  }
  .tier-seg.active { background: var(--ice); }
  .tier-labels {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 3px;
  }
  .tier-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-align: center;
    transition: color 0.3s;
    position: static;
    cursor: default;
    padding-bottom: 4px;
  }
  .tier-lbl.active { color: var(--ice); font-weight: 500; }
  .tier-lbl:hover { color: rgba(255,255,255,0.7); }

  .tier-tooltip-overlay {
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 200;
  }
  .tier-tooltip {
    position: absolute;
    top: 0;
    width: 200px;
    background: #071b42;
    border: 1px solid rgba(210,246,252,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    transform: translateY(4px);
    text-align: left;
    font-family: 'Figtree', sans-serif;
    box-shadow: 0 12px 32px rgba(7,27,66,0.55);
  }
  .tier-tooltip.visible { opacity: 1; transform: translateY(0); }
  .tier-tooltip::before {
    content: '';
    position: absolute;
    top: -5px;
    width: 9px; height: 9px;
    background: #071b42;
    border-left: 1px solid rgba(210,246,252,0.2);
    border-top: 1px solid rgba(210,246,252,0.2);
    transform: rotate(45deg);
  }
  .tier-tooltip-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--ice);
    margin-bottom: 3px;
    letter-spacing: 0.03em;
  }
  .tier-tooltip-range {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(210,246,252,0.4);
    margin-bottom: 7px;
    letter-spacing: 0.04em;
  }
  .tier-tooltip-desc {
    font-size: 12.5px;
    color: rgba(219,237,248,0.8);
    line-height: 1.6;
  }

  /* ── Tabs ── */
  .tabs-bar {
    background: var(--navy-deep);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tabs-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 14px 20px;
    font-family: 'Figtree', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.75); }
  .tab-btn.active { color: var(--ice); border-bottom-color: var(--ice); }

  /* ── Main layout ── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── Dimension cards ── */
  .dim-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .dim-card:hover { border-color: var(--border-strong); }
  .dim-card.active { border-color: var(--navy-light); box-shadow: 0 0 0 3px rgba(11,42,99,0.06); }

  .dim-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }
  .dim-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--sky);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    color: var(--navy);
  }
  .dim-meta { flex: 1; min-width: 0; }
  .dim-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 5px;
  }
  .dim-bar-wrap {
    height: 3px;
    background: var(--sky);
    border-radius: 2px;
  }
  .dim-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--navy);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .dim-score-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dim-chevron {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .dim-chevron.open { transform: rotate(180deg); }

  .dim-body {
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .dim-body.open { display: block; }
  .dim-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    padding: 12px 0 14px;
  }
  .level-grid { display: flex; flex-direction: column; gap: 6px; }
  .level-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--off-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: 'Figtree', sans-serif;
  }
  .level-btn:hover { border-color: var(--border-strong); background: var(--sky); }
  .level-btn.selected {
    background: var(--navy);
    border-color: var(--navy);
  }
  .level-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    min-width: 16px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .level-btn.selected .level-num { color: var(--ice); }
  .level-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .level-btn.selected .level-text { color: var(--white); font-weight: 500; }

  /* ── Save button ── */
  .save-btn {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    background: var(--navy);
    color: var(--ice);
    border: none;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:hover { background: var(--navy-mid); }
  .save-btn.saved { background: #1a7a4a; color: #a8f0cc; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .save-btn { flex: 1; margin-top: 0; }
  .reset-btn {
    padding: 14px 18px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reset-btn:hover { border-color: #c0392b; color: #c0392b; background: rgba(192,57,43,0.05); }
  .reset-btn.confirming { border-color: #c0392b; color: #fff; background: #c0392b; }

  .confirm-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(192,57,43,0.06);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 8px;
  }
  .confirm-bar.visible { display: flex; }
  .confirm-msg { font-size: 13px; color: #a93226; }
  .confirm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .confirm-yes {
    padding: 6px 14px;
    background: #c0392b; color: #fff;
    border: none; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; font-weight: 500;
  }
  .confirm-no {
    padding: 6px 14px;
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border-strong); border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
  }

  /* ── Tier context block ── */
  .tier-context {
    border-radius: 12px;
    padding: 1.4rem 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid rgba(11,42,99,0.15);
    background: var(--navy);
  }
  .tier-context-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .tier-context-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
  }
  .tier-context-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
  }
  .tier-context-desc {
    font-size: 14px;
    color: rgba(219,237,248,0.8);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .tier-context-signals {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .tier-signal {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: rgba(210,246,252,0.7);
    line-height: 1.5;
  }
  .tier-signal-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ice);
    margin-top: 6px;
    flex-shrink: 0;
  }
  .tier-next {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    color: rgba(210,246,252,0.55);
  }
  .tier-next strong { color: var(--ice); font-weight: 600; }

  /* ── Expanded level cards ── */
  .levels-list li { flex-direction: column; align-items: stretch; gap: 0; padding: 14px 0; }
  .level-row-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .level-meaning {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 6px;
  }
  .level-next-wrap {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 8px 10px;
    background: var(--sky);
    border-radius: 7px;
    font-size: 12px;
    color: var(--navy-light);
    line-height: 1.55;
  }
  .level-next-arrow { font-size: 11px; margin-top: 1px; flex-shrink: 0; color: var(--navy); }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .metric-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
  }
  .metric-card.accent {
    background: var(--navy);
    border-color: var(--navy);
  }
  .metric-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .metric-card.accent .metric-label { color: rgba(210,246,252,0.55); }
  .metric-value {
    font-size: 28px;
    font-weight: 900;
    color: var(--navy);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .metric-card.accent .metric-value { color: var(--ice); }
  .metric-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .metric-card.accent .metric-sub { color: rgba(210,246,252,0.45); }

  .breakdown-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .breakdown-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .radar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .radar-label {
    font-size: 13px;
    color: var(--text-secondary);
    width: 160px;
    flex-shrink: 0;
  }
  .radar-track {
    flex: 1;
    height: 5px;
    background: var(--sky);
    border-radius: 3px;
  }
  .radar-fill {
    height: 5px;
    border-radius: 3px;
    background: var(--navy);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .radar-score {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .levels-list { list-style: none; }
  .levels-list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .levels-list li:last-child { border-bottom: none; }
  .levels-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--white);
    background: var(--navy);
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .levels-name { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .levels-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* ── History tab ── */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; color: var(--sky-deep); }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  .history-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 10px;
  }
  .history-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-date { font-size: 14px; font-weight: 700; color: var(--navy); }
  .history-pts { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .history-dim {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .history-dim-name { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-dim-score { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--navy); flex-shrink: 0; }

  /* ── Footer ── */
  .footer {
    max-width: 860px;
    margin: 0 auto;
    padding: 1rem 2rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }
  .footer-brand {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .save-status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .header-inner, .progress-section, .main, .tabs-inner, .footer { padding-left: 1rem; padding-right: 1rem; }
    .radar-label { width: 110px; }
    .history-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="brand-line">
          <div class="brand-dot"></div>
          <span class="brand-label">Marvin Scale (T.O.D.)</span>
        </div>
        <h1>AI Maturity <span>Index</span></h1>
      </div>
      <div class="score-summary">
        <div>
          <div class="score-big" id="hdr-score">—<span>/30</span></div>
        </div>
        <div id="hdr-tier-pill" class="tier-pill" style="background:rgba(210,246,252,0.12);color:var(--ice);">—</div>
      </div>
    </div>
  </div>
  <div class="progress-section">
    <div class="tier-track" id="tier-track">
      <div class="tier-seg" data-tier="0"></div>
      <div class="tier-seg" data-tier="1"></div>
      <div class="tier-seg" data-tier="2"></div>
      <div class="tier-seg" data-tier="3"></div>
      <div class="tier-seg" data-tier="4"></div>
    </div>
    <div class="tier-labels" id="tier-labels">
      <div class="tier-lbl" data-tier="0">Unaware</div>
      <div class="tier-lbl" data-tier="1">Exploring</div>
      <div class="tier-lbl" data-tier="2">Building</div>
      <div class="tier-lbl" data-tier="3">Scaling</div>
      <div class="tier-lbl" data-tier="4">Leading</div>
    </div>

</div>

<script>
const ICONS = {

  talent:     `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>`,
  data:       `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v4c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 9v4c0 1.66 4.03 3 9 3s9-1.34 9-3V9"/><path d="M3 13v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4"/></svg>`,
  operating:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg>`,
  production: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  governance: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>`,
};

const DIMS = [
  { id:"strategy",   title:"Strategy & Vision",    desc:"Is AI tied to measurable business outcomes, not just an IT initiative?",
    levels:["No AI strategy exists; ad-hoc experimentation only","AI is on the roadmap but not tied to business KPIs","AI goals exist with owner accountability and budgets","AI is embedded in annual planning with clear OKRs","AI drives product differentiation and competitive strategy"] },
  { id:"talent",     title:"Talent & Culture",      desc:"Do your people have the skills and mindset to build and use AI?",
    levels:["No dedicated AI skills; general skepticism or fear","A few individuals experimenting independently","Small AI team exists; some upskilling programs running","AI literacy widespread; hiring strategy targets ML/data roles","AI-first culture; continuous learning embedded in workflows"] },
  { id:"data",       title:"Data Infrastructure",   desc:"Is your data actually AI-ready — clean, accessible, governed?",
    levels:["Data siloed, inconsistent, no governance","Some data pipelines exist but quality is unreliable","Core datasets are clean and accessible to AI teams","Real-time data pipelines with feature stores in place","Unified data platform; automated quality monitoring"] },
  { id:"operating",  title:"Operating Model",       desc:"Are workflows redesigned around AI, or is AI bolted onto old processes?",
    levels:["AI tools added without changing underlying processes","Isolated workflow changes in one or two teams","AI has redesigned core workflows in 2–3 functions","Cross-functional AI deployment with feedback loops","AI agents handle end-to-end workflows autonomously"] },
  { id:"production", title:"Production & Scale",    desc:"How broadly and reliably is AI deployed across the organization?",
    levels:["No AI in production; still in POC or pilot phase","1–2 models in production with manual monitoring","Several models in production with basic MLOps","Robust MLOps; models deployed across multiple functions","AI at scale; automated retraining, monitoring, rollback"] },
  { id:"governance", title:"Governance & Risk",     desc:"Do you have guardrails, oversight, and accountability for AI decisions?",
    levels:["No policies, no oversight of AI outputs","Informal guidelines; incident response is reactive","AI policy exists; basic audit trails in place","Formal AI review board; bias and risk assessments run","Proactive governance with automated compliance monitoring"] },
];

const TIERS = [
  { min:0,  max:9,  label:"Unaware",   bg:"rgba(210,246,252,0.12)", color:"#d2f6fc" },
  { min:10, max:14, label:"Exploring", bg:"rgba(219,237,248,0.2)",  color:"#dbedf8" },
  { min:15, max:19, label:"Building",  bg:"rgba(219,237,248,0.2)",  color:"#9dc8e8" },
  { min:20, max:24, label:"Scaling",   bg:"rgba(210,246,252,0.25)", color:"#58d8f0" },
  { min:25, max:30, label:"Leading",   bg:"rgba(210,246,252,0.35)", color:"#d2f6fc" },
];

const STORAGE_KEY = "ionos_ai_maturity_v1";

let scores = { strategy:3, talent:4, data:3, operating:2, production:3, governance:3 };
let history = [];
let expanded = null;
let unsaved = false;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.scores) scores = d.scores;
      if (d.history) history = d.history;
    }
  } catch(e) {}
}

function getTier(total) {
  return TIERS.find(t => total >= t.min && total <= t.max) || TIERS[0];
}
function getTierIndex(total) {
  return TIERS.findIndex(t => total >= t.min && total <= t.max);
}

function total() { return Object.values(scores).reduce((a,b)=>a+b,0); }

function updateHeader() {
  const t = total();
  const tier = getTier(t);
  const ti = getTierIndex(t);
  document.getElementById("hdr-score").innerHTML = t + '<span>/30</span>';
  const pill = document.getElementById("hdr-tier-pill");
  pill.textContent = tier.label;
  pill.style.background = tier.bg;
  pill.style.color = tier.color;
  document.querySelectorAll(".tier-seg").forEach((el, i) => {
    el.classList.toggle("active", i <= ti);
  });
  document.querySelectorAll(".tier-lbl").forEach((el, i) => {
    el.classList.toggle("active", i === ti);
  });
}

function renderDims() {
  const c = document.getElementById("dims-container");
  c.innerHTML = DIMS.map(d => {
    const s = scores[d.id];
    const pct = (s/5)*100;
    const isOpen = expanded === d.id;
    return `<div class="dim-card ${isOpen?'active':''}" id="card-${d.id}">
      <div class="dim-header" onclick="toggleDim('${d.id}')">
        <div class="dim-icon">${ICONS[d.id]}</div>
        <div class="dim-meta">
          <div class="dim-title">${d.title}</div>
          <div class="dim-bar-wrap"><div class="dim-bar" id="bar-${d.id}" style="width:${pct}%"></div></div>
        </div>
        <div class="dim-score-label">
          <span id="score-lbl-${d.id}">${s}/5</span>
          <span class="dim-chevron ${isOpen?'open':''}" id="chev-${d.id}">▼</span>
        </div>
      </div>
      <div class="dim-body ${isOpen?'open':''}" id="body-${d.id}">
        <div class="dim-desc">${d.desc}</div>
        <div class="level-grid">
          ${d.levels.map((l,i) => `<button class="level-btn ${s===i+1?'selected':''}" id="lvl-${d.id}-${i+1}" onclick="setScore('${d.id}',${i+1})">
            <span class="level-num">${i+1}</span>
            <span class="level-text">${l}</span>
          </button>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDim(id) {
  expanded = expanded === id ? null : id;
  renderDims();
}

function setScore(id, val) {
  scores[id] = val;
  unsaved = true;
  document.getElementById("save-status").textContent = "Unsaved changes";
  const pct = (val/5)*100;
  const bar = document.getElementById("bar-"+id);
  if (bar) bar.style.width = pct+"%";
  const lbl = document.getElementById("score-lbl-"+id);
  if (lbl) lbl.textContent = val+"/5";
  DIMS.find(d=>d.id===id).levels.forEach((_,i) => {
    const btn = document.getElementById("lvl-"+id+"-"+(i+1));
    if (btn) btn.classList.toggle("selected", i+1 === val);
  });
  updateHeader();
  if (document.getElementById("tab-overview").style.display !== "none") renderOverview();
}

function saveScores() {
  const entry = {
    date: new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}),
    scores: {...scores},
    total: total()
  };
  history = [entry, ...history].slice(0, 12);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({scores, history}));
  unsaved = false;
  const btn = document.getElementById("save-btn");
  btn.textContent = "✓ Saved";
  btn.classList.add("saved");
  document.getElementById("save-status").textContent = "Results saved";
  setTimeout(() => { btn.textContent = "Save Results"; btn.classList.remove("saved"); }, 2200);
}

function promptReset() {
  document.getElementById("confirm-bar").classList.add("visible");
  document.getElementById("reset-btn").classList.add("confirming");
}
function cancelReset() {
  document.getElementById("confirm-bar").classList.remove("visible");
  document.getElementById("reset-btn").classList.remove("confirming");
}
function confirmReset() {
  scores = { strategy:1, talent:1, data:1, operating:1, production:1, governance:1 };
  history = [];
  localStorage.removeItem(STORAGE_KEY);
  expanded = null;
  unsaved = false;
  cancelReset();
  renderDims();
  updateHeader();
  document.getElementById("save-status").textContent = "Reset — no saved data";
}

const TIER_DETAILS = {

function renderOverview() {
  const t = total();
  const tier = getTier(t);
  const ti = getTierIndex(t);
  const maxDim = DIMS.reduce((a,b) => scores[b.id] > scores[a.id] ? b : a);
  const minDim = DIMS.reduce((a,b) => scores[b.id] < scores[a.id] ? b : a);
  const td = TIER_DETAILS[tier.label] || {};

  document.getElementById("ov-metrics").innerHTML = `
    <div class="metric-card accent">
      <div class="metric-label">Score</div>
      <div class="metric-value">${t}<span style="font-size:16px;font-weight:400;color:rgba(210,246,252,0.4)">/30</span></div>
    </div>
    <div class="metric-card" style="background:var(--sky);border-color:var(--sky-deep)">
      <div class="metric-label" style="color:var(--navy-light)">Tier</div>
      <div class="metric-value" style="font-size:20px;padding-top:4px;color:var(--navy)">${tier.label}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Strongest</div>
      <div class="metric-value" style="font-size:15px;padding-top:4px;line-height:1.3">${maxDim.title}</div>
      <div class="metric-sub" style="font-family:'DM Mono',monospace">${scores[maxDim.id]}/5</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Priority gap</div>
      <div class="metric-value" style="font-size:15px;padding-top:4px;line-height:1.3">${minDim.title}</div>
      <div class="metric-sub" style="font-family:'DM Mono',monospace">${scores[minDim.id]}/5</div>
    </div>`;

  document.getElementById("ov-tier-context").innerHTML = `
    <div class="tier-context">
      <div class="tier-context-header">
        <span class="tier-context-badge" style="background:${tier.bg};color:${tier.color}">${tier.label}</span>
        <span class="tier-context-title">What this tier means for your organization</span>
      </div>
      <div class="tier-context-desc">${td.desc || ''}</div>
      <div class="tier-context-signals">
        ${(td.signals||[]).map(s=>`<div class="tier-signal"><div class="tier-signal-dot"></div><span>${s}</span></div>`).join('')}
      </div>
      ${td.next ? `<div class="tier-next"><strong>What to do next:</strong> ${td.next}</div>` : ''}
    </div>`;

  document.getElementById("ov-bars").innerHTML = DIMS.map(d =>
    `<div class="radar-row">
      <span class="radar-label">${d.title}</span>
      <div class="radar-track"><div class="radar-fill" style="width:${(scores[d.id]/5)*100}%"></div></div>
      <span class="radar-score">${scores[d.id]}/5</span>
    </div>`).join('');

  document.getElementById("ov-levels").innerHTML = DIMS.map(d => {
    const s = scores[d.id];
    const info = (DIM_MEANINGS[d.id] || [])[s-1] || {};
    const hasNext = s < 5 && info.next;
    const nextLevel = s < 5 ? d.levels[s] : null;
    return `<li>
      <div class="level-row-top">
        <span class="levels-badge">${s}/5</span>
        <div>
          <div class="levels-name">${d.title}</div>
          <div style="font-size:12px;color:var(--text-muted);font-style:italic">${d.levels[s-1]}</div>
        </div>
      </div>
      <div class="level-meaning">${info.meaning || ''}</div>
      ${hasNext ? `<div class="level-next-wrap"><span class="level-next-arrow">→</span><span><strong style="color:var(--navy);font-weight:600">To reach level ${s+1}:</strong> ${info.next}</span></div>` : (s===5 ? `<div class="level-next-wrap"><span class="level-next-arrow">✓</span><span><strong style="color:var(--navy);font-weight:600">Maximum level reached.</strong> Focus on sustaining and compounding this advantage.</span></div>` : '')}
    </li>`;
  }).join('');
}

function renderHistory() {
  const c = document.getElementById("history-container");
  if (!history.length) {
    c.innerHTML = `<div class="empty-state">
      <div class="empty-icon">◎</div>
      <div class="empty-title">No snapshots yet</div>
      <div class="empty-sub">Save your results to start tracking progress over time.</div>
    </div>`;
    return;
  }
  c.innerHTML = history.map(entry => {
    const tier = getTier(entry.total);
    return `<div class="history-card">
      <div class="history-top">
        <div>
          <div class="history-date">${entry.date}</div>
          <div class="history-pts">${entry.total}/30 pts</div>
        </div>
        <div class="tier-pill" style="background:${tier.bg};color:${tier.color};border:1px solid ${tier.color}33">${tier.label}</div>
      </div>
      <div class="history-grid">
        ${DIMS.map(d => `<div class="history-dim">
          <span class="history-dim-name">${d.title}</span>
          <span class="history-dim-score">${entry.scores?.[d.id]??'—'}/5</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function switchTab(name, btn) {
  ["assess","overview","history"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===name ? "block" : "none";
  });
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (name === "overview") renderOverview();
  if (name === "history") renderHistory();
}

const TIER_TOOLTIPS = [
  { name:"Unaware",   range:"0 – 9 pts",   desc:"No meaningful AI activity. There is no strategy, no ownership, no investment, and no coordinated effort. Any AI use is entirely ad-hoc and individual." },
  { name:"Exploring", range:"10 – 14 pts", desc:"Awareness is growing and pilots are running, but efforts are fragmented. There is no shared infrastructure, no clear success criteria, and no connection to business outcomes." },
  { name:"Building",  range:"15 – 19 pts", desc:"Real AI is in production in a few areas. The team can build and deploy, but AI is still project-by-project. Workflows haven't fundamentally changed and value doesn't yet compound." },
  { name:"Scaling",   range:"20 – 24 pts", desc:"AI is embedded across multiple functions and visibly contributing to business performance. Infrastructure and talent exist. Governance and cross-functional depth are the next challenges." },
  { name:"Leading",   range:"25 – 30 pts", desc:"AI is a core competitive driver shaping product, operations, and strategy. You are in the global top 6% of organizations, attributing 5%+ of EBIT to AI." },
];

(function initTooltips() {
  const labels = document.querySelectorAll('#tier-labels .tier-lbl');
  const tooltip = document.getElementById('tier-tooltip');
  const overlay = document.getElementById('tier-tooltip-overlay');
  const ttName  = document.getElementById('tt-name');
  const ttRange = document.getElementById('tt-range');
  const ttDesc  = document.getElementById('tt-desc');

  labels.forEach((lbl, i) => {
    lbl.addEventListener('mouseenter', () => {
      const d = TIER_TOOLTIPS[i];
      ttName.textContent  = d.name;
      ttRange.textContent = d.range;
      ttDesc.textContent  = d.desc;

      // Position: center tooltip on the label, clamped to overlay width
      const overlayRect = overlay.parentElement.getBoundingClientRect();
      const lblRect     = lbl.getBoundingClientRect();
      const TW = 200;
      let left = (lblRect.left - overlayRect.left) + lblRect.width / 2 - TW / 2;
      left = Math.max(0, Math.min(left, overlayRect.width - TW));

      // Arrow position relative to tooltip
      const arrowLeft = (lblRect.left - overlayRect.left) + lblRect.width / 2 - left;
      tooltip.style.left = left + 'px';
      tooltip.querySelector('::before'); // trigger reflow
      tooltip.style.setProperty('--arrow-left', Math.max(14, Math.min(arrowLeft, TW - 14)) + 'px');

      // Set arrow via inline style on ::before via a wrapper trick
      tooltip.setAttribute('data-arrow', Math.max(14, Math.min(arrowLeft, TW - 14)));
      updateArrow();

      tooltip.classList.add('visible');
    });
    lbl.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });

  function updateArrow() {
    const pos = tooltip.getAttribute('data-arrow') || '50';
    // inject a style tag to position ::before dynamically
    let st = document.getElementById('arrow-style');
    if (!st) { st = document.createElement('style'); st.id = 'arrow-style'; document.head.appendChild(st); }
    st.textContent = `.tier-tooltip::before { left: ${pos}px; }`;
  }
})();

load();
renderDims();
updateHeader();
</script>
